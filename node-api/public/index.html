<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mağaza</title>
  <style>
    /* ── Temel değişkenler ── */
    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --accent:   #e8c547;
      --accent2:  #c9a227;
      --text:     #f0f0f0;
      --muted:    #888;
      --danger:   #e05555;
      --success:  #4caf79;
      --radius:   10px;
      --font:     'Segoe UI', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ── Navbar ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    #cart-btn {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      padding: 8px 20px;
      border-radius: var(--radius);
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #cart-btn:hover { background: var(--accent2); }

    #cart-count {
      background: #0f0f0f;
      color: var(--accent);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
    }

    /* ── Auth banner ── */
    #auth-banner {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    #auth-banner input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      width: 160px;
    }
    #auth-banner input:focus { outline: 1px solid var(--accent); }
    #auth-banner button {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    #auth-banner button:hover { background: rgba(232,197,71,0.1); }
    #user-info { color: var(--accent); font-weight: 600; }

    /* ── Filtre çubuğu ── */
    .filter-bar {
      padding: 20px 32px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,197,71,0.07);
    }

    /* ── Ürün ızgarası ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 24px 32px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-3px);
      border-color: #444;
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #222;
      display: block;
    }

    .product-body { padding: 14px; }

    .product-category {
      font-size: 0.7rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .product-name {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .product-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }

    .product-stock {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .add-to-cart {
      width: 100%;
      margin-top: 12px;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      padding: 9px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .add-to-cart:hover { background: var(--accent2); }
    .add-to-cart:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* ── Sepet paneli ── */
    #cart-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 200;
    }
    #cart-panel.open { transform: translateX(0); }

    .cart-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 1.1rem;
    }

    #close-cart {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
    }
    #close-cart:hover { color: var(--text); }

    .cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }

    .cart-item {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .cart-item-name { font-size: 0.9rem; font-weight: 600; flex: 1; }
    .cart-item-detail { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .cart-item-price { font-weight: 700; color: var(--accent); font-size: 0.95rem; white-space: nowrap; }

    .remove-item {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
    }

    .cart-empty {
      text-align: center;
      color: var(--muted);
      padding: 48px 0;
      font-size: 0.9rem;
    }

    .cart-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .cart-total span:last-child { color: var(--accent); }

    #checkout-btn {
      width: 100%;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      padding: 13px;
      border-radius: var(--radius);
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #checkout-btn:hover { background: var(--accent2); }
    #checkout-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* ── Ürün detay modal ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 20px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    #modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
    }

    .modal-body { padding: 20px 24px 24px; }
    .modal-body img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .modal-price {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      margin: 8px 0;
    }

    .modal-desc { color: var(--muted); font-size: 0.9rem; margin-bottom: 16px; line-height: 1.5; }

    .rec-title {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 20px 0 12px;
      font-weight: 600;
    }

    .rec-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .rec-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      transition: border-color 0.2s;
      text-align: center;
    }
    .rec-card:hover { border-color: var(--accent); }
    .rec-card img { width: 100%; border-radius: 4px; margin-bottom: 6px; }
    .rec-card-name { font-size: 0.78rem; font-weight: 600; }
    .rec-card-price { font-size: 0.82rem; color: var(--accent); font-weight: 700; margin-top: 2px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.3s ease;
      z-index: 500;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); }

    /* ── Overlay (sepet arka plan) ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 150;
      display: none;
    }
    #overlay.open { display: block; }

    /* ── Yükleniyor ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, #222 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>
  <div class="logo">ma<span>ğ</span>aza</div>
  <div class="nav-right">
    <span id="user-info" style="display:none"></span>
    <button id="cart-btn" onclick="toggleCart()">
      🛒 Sepet <span id="cart-count">0</span>
    </button>
  </div>
</nav>

<!-- Auth Banner -->
<div id="auth-banner">
  <span>Giriş yap:</span>
  <input type="email" id="login-email" placeholder="E-posta" value="test@example.com" />
  <input type="password" id="login-pass" placeholder="Şifre" value="123456" />
  <button onclick="login()">Giriş</button>
  <span style="color:var(--border)">|</span>
  <span style="color:var(--muted)">Hesap yok mu?</span>
  <button onclick="showRegister()">Kayıt ol</button>
</div>

<!-- Filtre çubuğu -->
<div class="filter-bar">
  <button class="filter-btn active" onclick="filterProducts('tumu', this)">Tümü</button>
  <button class="filter-btn" onclick="filterProducts('elektronik', this)">Elektronik</button>
  <button class="filter-btn" onclick="filterProducts('giyim', this)">Giyim</button>
  <button class="filter-btn" onclick="filterProducts('ev', this)">Ev</button>
  <button class="filter-btn" onclick="filterProducts('kirtasiye', this)">Kırtasiye</button>
</div>

<!-- Ürün ızgarası -->
<div class="products-grid" id="products-grid"></div>

<!-- Sepet paneli -->
<div id="overlay" onclick="toggleCart()"></div>
<div id="cart-panel">
  <div class="cart-header">
    <span>Sepetim</span>
    <button id="close-cart" onclick="toggleCart()">×</button>
  </div>
  <div class="cart-items" id="cart-items">
    <div class="cart-empty">Sepetiniz boş</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Toplam</span>
      <span id="cart-total">₺0.00</span>
    </div>
    <button id="checkout-btn" onclick="checkout()" disabled>Siparişi Tamamla</button>
  </div>
</div>

<!-- Ürün detay modal -->
<div id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="product-modal">
    <div class="modal-header">
      <div>
        <div id="modal-category" class="product-category"></div>
        <div id="modal-name" style="font-size:1.2rem;font-weight:700;"></div>
      </div>
      <button id="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <img id="modal-img" src="" alt="" />
      <div id="modal-price" class="modal-price"></div>
      <div id="modal-desc" class="modal-desc"></div>
      <div id="modal-stock" class="product-stock"></div>
      <button class="add-to-cart" style="margin-top:16px;" id="modal-add-btn" onclick="addToCartFromModal()">
        Sepete Ekle
      </button>
      <div id="modal-recs" style="display:none">
        <div class="rec-title">Bunları da beğenebilirsin</div>
        <div class="rec-grid" id="rec-grid"></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = 'http://34.247.162.12:3000';
  let currentUser = null;
  let allProducts  = [];
  let modalProduct = null;

  // ── Başlangıç ──────────────────────────────────────────────
  loadProducts();

  async function loadProducts(category) {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '<div class="skeleton" style="height:280px;border-radius:10px;"></div>'.repeat(6)
      .split('</div>').join('</div>\n');

    const url = category ? `${API}/products?category=${category}` : `${API}/products`;
    const res  = await fetch(url);
    allProducts = await res.json();
    renderProducts(allProducts);
  }

  function renderProducts(products) {
    const grid = document.getElementById('products-grid');
    if (!products.length) {
      grid.innerHTML = '<p style="color:var(--muted);padding:32px">Bu kategoride ürün bulunamadı.</p>';
      return;
    }
    grid.innerHTML = products.map(p => `
      <div class="product-card" onclick="openModal(${p.id})">
        <img class="product-img" src="${p.image_url}" alt="${p.name}" loading="lazy" />
        <div class="product-body">
          <div class="product-category">${p.category}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">₺${Number(p.price).toLocaleString('tr-TR', {minimumFractionDigits:2})}</div>
          <div class="product-stock">${p.stock > 0 ? `Stok: ${p.stock}` : 'Tükendi'}</div>
          <button class="add-to-cart" ${p.stock === 0 ? 'disabled' : ''}
            onclick="event.stopPropagation(); addToCart(${p.id})">
            ${p.stock > 0 ? 'Sepete Ekle' : 'Tükendi'}
          </button>
        </div>
      </div>
    `).join('');
  }

  function filterProducts(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (cat === 'tumu') loadProducts();
    else loadProducts(cat);
  }

  // ── Ürün Modal ──────────────────────────────────────────────
  async function openModal(id) {
    const res  = await fetch(`${API}/products/${id}`);
    const data = await res.json();
    modalProduct = data.product;

    document.getElementById('modal-category').textContent = data.product.category;
    document.getElementById('modal-name').textContent     = data.product.name;
    document.getElementById('modal-img').src              = data.product.image_url;
    document.getElementById('modal-img').alt              = data.product.name;
    document.getElementById('modal-price').textContent    =
      '₺' + Number(data.product.price).toLocaleString('tr-TR', {minimumFractionDigits:2});
    document.getElementById('modal-desc').textContent     = data.product.description;
    document.getElementById('modal-stock').textContent    =
      data.product.stock > 0 ? `Stok: ${data.product.stock}` : 'Tükendi';

    const addBtn = document.getElementById('modal-add-btn');
    addBtn.disabled = data.product.stock === 0;
    addBtn.textContent = data.product.stock > 0 ? 'Sepete Ekle' : 'Tükendi';

    // Öneriler
    const recSection = document.getElementById('modal-recs');
    const recGrid    = document.getElementById('rec-grid');
    if (data.recommendations && data.recommendations.length) {
      recGrid.innerHTML = data.recommendations.map(r => `
        <div class="rec-card" onclick="closeModal(); setTimeout(()=>openModal(${r.id}),200)">
          <img src="${r.image_url}" alt="${r.name}" />
          <div class="rec-card-name">${r.name}</div>
          <div class="rec-card-price">₺${Number(r.price).toLocaleString('tr-TR',{minimumFractionDigits:2})}</div>
        </div>
      `).join('');
      recSection.style.display = 'block';
    } else {
      recSection.style.display = 'none';
    }

    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    modalProduct = null;
  }

  function closeModalOnOverlay(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function addToCartFromModal() {
    if (modalProduct) addToCart(modalProduct.id);
  }

  // ── Sepet ──────────────────────────────────────────────────
  async function addToCart(productId) {
    if (!currentUser) { showToast('Önce giriş yapmalısınız', true); return; }
    const res = await fetch(`${API}/cart`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ user_id: currentUser.id, product_id: productId, quantity: 1 }),
    });
    if (res.ok) {
      showToast('Ürün sepete eklendi ✓');
      loadCart();
    } else {
      const err = await res.json();
      showToast(err.error || 'Hata oluştu', true);
    }
  }

  async function loadCart() {
    if (!currentUser) return;
    const res  = await fetch(`${API}/cart/${currentUser.id}`);
    const data = await res.json();
    const items = data.items || [];

    document.getElementById('cart-count').textContent = items.length;
    document.getElementById('cart-total').textContent =
      '₺' + Number(data.total).toLocaleString('tr-TR', {minimumFractionDigits:2});

    const container = document.getElementById('cart-items');
    if (!items.length) {
      container.innerHTML = '<div class="cart-empty">Sepetiniz boş</div>';
      document.getElementById('checkout-btn').disabled = true;
      return;
    }

    document.getElementById('checkout-btn').disabled = false;
    container.innerHTML = items.map(item => `
      <div class="cart-item">
        <div style="flex:1">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-detail">${item.quantity} adet × ₺${Number(item.price).toLocaleString('tr-TR',{minimumFractionDigits:2})}</div>
        </div>
        <div class="cart-item-price">₺${Number(item.line_total).toLocaleString('tr-TR',{minimumFractionDigits:2})}</div>
        <button class="remove-item" onclick="removeFromCart(${item.cart_item_id})">×</button>
      </div>
    `).join('');
  }

  async function removeFromCart(cartItemId) {
    await fetch(`${API}/cart/${cartItemId}`, { method: 'DELETE' });
    loadCart();
  }

  async function checkout() {
    if (!currentUser) return;
    const res  = await fetch(`${API}/orders`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ user_id: currentUser.id }),
    });
    const data = await res.json();
    if (res.ok) {
      showToast(`Sipariş #${data.order_id} oluşturuldu! ₺${Number(data.total).toLocaleString('tr-TR',{minimumFractionDigits:2})}`);
      loadCart();
      loadProducts();   // stok güncellendi
      toggleCart();
    } else {
      showToast(data.error || 'Hata oluştu', true);
    }
  }

  function toggleCart() {
    document.getElementById('cart-panel').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
    if (document.getElementById('cart-panel').classList.contains('open')) loadCart();
  }

  // ── Auth ───────────────────────────────────────────────────
  async function login() {
    const email    = document.getElementById('login-email').value;
    const password = document.getElementById('login-pass').value;
    const res  = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (res.ok) {
      currentUser = data.user;
      document.getElementById('auth-banner').innerHTML =
        `<span>👤</span><span id="user-info">Merhaba, <strong>${data.user.name}</strong></span>
         <button onclick="logout()" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:0.82rem;">Çıkış</button>`;
      showToast(`Hoş geldiniz, ${data.user.name}!`);
      loadCart();
    } else {
      showToast(data.error || 'Giriş başarısız', true);
    }
  }

  function logout() {
    currentUser = null;
    location.reload();
  }

  function showRegister() {
    const name  = prompt('Adınız:');
    const email = prompt('E-posta:');
    const pass  = prompt('Şifre:');
    if (!name || !email || !pass) return;
    fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, password: pass }),
    }).then(r => r.json()).then(data => {
      if (data.id) showToast('Kayıt başarılı! Şimdi giriş yapabilirsiniz.');
      else showToast(data.error || 'Hata', true);
    });
  }

  // ── Toast ──────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error' : '';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
